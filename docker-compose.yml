version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: weekly_postgres
    restart: unless-stopped
    ports:
      - '5433:5432'
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-weekly}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-weekly1234}
      POSTGRES_DB: ${POSTGRES_DB:-weekly_report}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-weekly}']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
